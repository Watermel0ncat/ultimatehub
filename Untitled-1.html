<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watermel0ncat Hub</title>

<style>
:root{
    --bg:#09090f;
    --card:rgba(255,255,255,.05);
    --text:white;
    --muted:#a1a1aa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,sans-serif;
}

body{
    background:
        radial-gradient(circle at top left,#6d28d9,transparent 30%),
        radial-gradient(circle at bottom right,#2563eb,transparent 30%),
        #09090f;
    color:white;
    min-height:100vh;
}

.container{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:260px;
    padding:25px;
    border-right:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
}

.sidebar h2{
    margin-bottom:20px;
}

.category-btn{
    width:100%;
    border:none;
    background:rgba(255,255,255,.05);
    color:white;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
}

.category-btn:hover{
    background:rgba(255,255,255,.12);
}

.main{
    flex:1;
    padding:40px;
}

.hero{
    margin-bottom:30px;
}

.hero h1{
    font-size:3rem;
}

.hero p{
    color:var(--muted);
    margin-top:10px;
}

.search{
    margin:25px 0;
}

.search input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,.08);
    color:white;
    font-size:1rem;
}

.featured-section{
    margin-bottom:40px;
}

.featured-title{
    font-size:1.5rem;
    margin-bottom:15px;
}

.grid{
    display:grid;
    grid-template-columns:
        repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.card{
    padding:22px;
    border-radius:18px;
    background:var(--card);
    backdrop-filter:blur(12px);
    border:2px solid transparent;
    cursor:pointer;
    transition:.25s;
}

.card:hover{
    transform:translateY(-6px);
}

.card h3{
    margin-bottom:10px;
}

.card p{
    color:var(--muted);
    min-height:50px;
}

.topics{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-top:15px;
}

.topic{
    padding:4px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    font-size:.75rem;
}

.loading{
    text-align:center;
    margin-top:100px;
}
</style>
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>📂 Categories</h2>
        <div id="categories"></div>
    </aside>

    <main class="main">

        <section class="hero">
            <h1>🍉 Watermel0ncat Hub</h1>
            <p>Automatically powered by GitHub Topics</p>
        </section>

        <div class="search">
            <input
                id="search"
                placeholder="Search projects..."
            >
        </div>

        <section id="featured"></section>

        <section>
            <div id="projects" class="grid"></div>
        </section>

        <div id="loading" class="loading">
            Loading projects...
        </div>

    </main>

</div>

<script>

const USERNAME = "watermel0ncat";

const CATEGORY_COLORS = {
    games:"#ff5c5c",
    tools:"#00d084",
    experiments:"#b86cff",
    libraries:"#ffd166",
    websites:"#4dabff",
    bots:"#00e5ff",
    other:"#666"
};

let allProjects = [];
let currentCategory = "all";

async function loadProjects(){

    const response = await fetch(
        `https://api.github.com/users/${USERNAME}/repos?per_page=100`,
        {
            headers:{
                Accept:
                "application/vnd.github.mercy-preview+json"
            }
        }
    );

    const repos = await response.json();

    allProjects = repos
        .filter(repo =>
            !repo.fork &&
            !repo.archived
        )
        .sort(
            (a,b)=>
            new Date(b.updated_at) -
            new Date(a.updated_at)
        );

    createCategories();
    renderFeatured();
    renderProjects(allProjects);

    document
        .getElementById("loading")
        .style.display = "none";
}

function getCategory(repo){

    const categories = [
        "games",
        "tools",
        "experiments",
        "libraries",
        "websites",
        "bots"
    ];

    return (
        repo.topics.find(
            t => categories.includes(t)
        ) || "other"
    );
}

function createCategories(){

    const sidebar =
        document.getElementById("categories");

    const unique =
        [...new Set(
            allProjects.map(getCategory)
        )];

    sidebar.innerHTML =
        `<button class="category-btn"
         onclick="setCategory('all')">
         🌎 All
         </button>`;

    unique.forEach(cat=>{

        sidebar.innerHTML += `
        <button
            class="category-btn"
            onclick="setCategory('${cat}')">

            ${cat}
        </button>`;
    });
}

function setCategory(category){

    currentCategory = category;

    filterProjects(
        document
            .getElementById("search")
            .value
    );
}

function filterProjects(query){

    query = query.toLowerCase();

    let projects = allProjects.filter(repo => {

        const matchesSearch =
            repo.name.toLowerCase().includes(query)
            ||
            (repo.description || "")
            .toLowerCase()
            .includes(query);

        const matchesCategory =
            currentCategory === "all"
            ||
            getCategory(repo)
            === currentCategory;

        return matchesSearch &&
               matchesCategory;
    });

    renderProjects(projects);
}

function renderFeatured(){

    const featured =
        allProjects.filter(repo =>
            repo.topics.includes("featured")
        );

    if(featured.length === 0) return;

    const container =
        document.getElementById("featured");

    container.innerHTML =
        `<div class="featured-section">
            <div class="featured-title">
                ⭐ Featured Projects
            </div>
            <div id="featured-grid"
                 class="grid">
            </div>
        </div>`;

    const grid =
        document.getElementById("featured-grid");

    featured.forEach(repo => {

        grid.appendChild(
            createCard(repo)
        );
    });
}

function createCard(repo){

    const category =
        getCategory(repo);

    const color =
        CATEGORY_COLORS[category]
        || "#666";

    const card =
        document.createElement("div");

    card.className = "card";

    card.style.borderColor = color;

    card.innerHTML = `
        <h3>${repo.name}</h3>

        <p>
        ${
            repo.description
            || "No description."
        }
        </p>

        <div class="topics">
            ${repo.topics.map(
                t =>
                `<span class="topic">
                    ${t}
                </span>`
            ).join("")}
        </div>
    `;

    card.onclick = () => {

        window.open(
            `https://${USERNAME}.github.io/${repo.name}/`,
            "_blank"
        );
    };

    return card;
}

function renderProjects(projects){

    const container =
        document.getElementById("projects");

    container.innerHTML = "";

    projects.forEach(repo => {

        container.appendChild(
            createCard(repo)
        );
    });
}

document
.getElementById("search")
.addEventListener("input",
e => filterProjects(e.target.value));

loadProjects();

</script>

</body>
</html>
